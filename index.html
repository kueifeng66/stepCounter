<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Step Counter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .steps {
      font-size: 5rem;
      font-weight: bold;
      margin: 20px 0;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 15px;
      font-size: 1rem;
      cursor: pointer;
      margin: 10px;
      background: white;
      color: #333;
      font-weight: bold;
    }

    .info {
      margin-top: 20px;
      font-size: 1rem;
      opacity: 0.9;
    }

    .status {
      margin-top: 10px;
      font-size: 1rem;
    }
    #blackout {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none; /* Hidden by default */
      z-index: 9999;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="blackout"></div>
  <div class="container">
    <h1>Step Counter</h1>

    <div class="steps" id="stepCount">0</div>

    <button id="startBtn" onclick="startCounter(this)">Start</button>
    <button onclick="resetCounter()">Reset</button>

    <div class="info">
      Walk naturally with your phone.
    </div>

    <div class="status" id="status">
      Waiting...
    </div>
  </div>

  <script>


    let wakeLock = null;

    async function requestWakeLock() {
      try {
        // This requests the "screen" stay on
        wakeLock = await navigator.wakeLock.request('screen');
        console.log('Wake Lock is active');
    
      } catch (err) {
      console.error(`${err.name}, ${err.message}`);
      }
    }

    // Re-request wake lock when the app becomes visible again
  document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
      await requestWakeLock();
    }
  });

    let steps = 0;

    let lastStepTime = 0;
    // THRESHOLD TUNING: 
    // 12 to 14 is usually the "sweet spot" for walking. 
    // Gravity is ~9.8. A step usually adds 2-4 units of force.
    const threshold = 12.5;

    const minStepInterval = 350;

    let previousMagnitude = 0;

async function startCounter(buttonElement) {



      

      const status = document.getElementById("status");

      // iPhone permission request
      if (
        typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function"
      ) {

        try {

          const permission = await DeviceMotionEvent.requestPermission();

          if (permission !== "granted") {
            status.innerText = "Motion permission denied";
            return;
          }

        } catch (err) {
          status.innerText = "Permission error";
          return;
        }
      }

      if ('wakeLock' in navigator) {
          await requestWakeLock();
      }
      
      // 3. UI Changes
       buttonElement.disabled = true;
       buttonElement.innerText = "Tracking...";
       buttonElement.style.opacity = "0.5"; // Visual cue that it's disabled
       buttonElement.style.cursor = "not-allowed";
       status.innerText = "Tracking steps...";
       window.addEventListener("devicemotion", handleMotion);
    }

    function handleMotion(event) {

      const acc = event.accelerationIncludingGravity;

      if (!acc) return;

      const x = acc.x || 0;
      const y = acc.y || 0;
      const z = acc.z || 0;

      // magnitude of movement
      const magnitude = Math.sqrt(x * x + y * y + z * z);



      const now = Date.now();

      // basic step detection
      if (magnitude > threshold && (now - lastStepTime) > minStepInterval){

        steps++;

        lastStepTime = now;

        document.getElementById("stepCount").innerText = steps;
      }

      document.getElementById("status").innerText =
        `Movement: ${magnitude.toFixed(2)}`;
    }

    function resetCounter() {
      steps = 0;
      document.getElementById("stepCount").innerText = 0;
      // Re-enable the start button
      const startBtn = document.getElementById("startBtn");
      startBtn.disabled = false;
      startBtn.innerText = "Start";
      startBtn.style.opacity = "1";
      startBtn.style.cursor = "pointer";
  
      // Optional: Stop tracking until they hit start again
      window.removeEventListener("devicemotion", handleMotion);
      document.getElementById("status").innerText = "Paused";
    }

    let lastTap = 0;
const blackoutOverlay = document.getElementById('blackout');

// Listen for touches on the entire window
window.addEventListener('touchstart', function (e) {
    const now = Date.now();
    const DOUBLE_TAP_THRESHOLD = 300; 

    if (now - lastTap < DOUBLE_TAP_THRESHOLD) {
        // Double tap detected!
        toggleBlackout();
        
        // Prevent default zoom behavior on double tap
        if (e.cancelable) e.preventDefault();
    }
    lastTap = now;
}, { passive: false });

function toggleBlackout() {
    if (blackoutOverlay.style.display === 'block') {
        blackoutOverlay.style.display = 'none';
    } else {
        blackoutOverlay.style.display = 'block';
    }
}

  
  </script>

</body>
</html>
